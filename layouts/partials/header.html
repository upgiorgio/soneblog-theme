<header class="site-header" id="site-header">
  <div class="container">
    <div class="header-row">
      <a href="/" class="site-title">{{ .Site.Title }}</a>
      <div class="header-actions">
        <button class="search-toggle" id="search-toggle" aria-label="搜索">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">&#x25D1;</button>
        <button class="mobile-toggle" id="mobile-menu-btn" aria-label="菜单">&#x2261;</button>
      </div>
    </div>
    <nav class="terminal-nav" id="terminal-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>

<script>
(function() {
  var btn = document.getElementById('mobile-menu-btn');
  var nav = document.getElementById('terminal-nav');
  if (btn && nav) {
    btn.addEventListener('click', function() {
      nav.classList.toggle('open');
    });
  }
})();
</script>
